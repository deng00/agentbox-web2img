name: Build and Push to Docker Hub

# 仅在 main 分支上打 v* tag 时触发部署（下方有 tag 是否在 main 上的校验）
on:
  push:
    tags: ["v*"]

env:
  # Docker Hub 仓库名，默认 <用户名>/agentbox-web2img；可在仓库 Variables 里覆盖 IMAGE_NAME
  IMAGE_NAME: ${{ vars.IMAGE_NAME || format('{0}/agentbox-web2img', secrets.DOCKERHUB_USERNAME) }}
  # Claude Code CLI 版本，可在仓库 Variables 里覆盖
  CLAUDE_CODE_VERSION: ${{ vars.CLAUDE_CODE_VERSION || '2.1.126' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确认 tag 在 main 分支上
        run: |
          git fetch origin main --quiet
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "✓ tag commit $GITHUB_SHA 在 main 上，继续发布"
          else
            echo "✗ tag commit 不在 main 分支上，终止发布" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # 只发两个 tag：完整版本号（如 0.1.0）和 latest
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
